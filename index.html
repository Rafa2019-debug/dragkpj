<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor Image to Text (11 Digit)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        #drop-zone { border: 2px dashed #3498db; padding: 40px; text-align: center; border-radius: 8px; background: #ecf0f1; cursor: pointer; transition: 0.3s; }
        #drop-zone.hover { background: #d5dbdb; border-color: #2980b9; }
        #file-input { display: none; }
        #results { margin-top: 20px; }
        .result-item { background: #f9f9f9; padding: 15px; border-left: 5px solid #2ecc71; margin-bottom: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .file-name { font-weight: bold; color: #34495e; }
        .extracted-text { font-size: 1.2em; color: #e74c3c; font-family: monospace; margin-top: 5px; }
        .loader { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Image to Text Extractor <br><small style="font-size: 0.6em; color: #7f8c8d;">Ambil 11 Digit Pertama</small></h2>
    
    <div id="drop-zone">
        <p>Drag & drop beberapa gambar di sini, atau <strong>klik untuk memilih file</strong></p>
        <input type="file" id="file-input" multiple accept="image/*">
    </div>

    <div id="results"></div>
</div>

<script src="app.js"></script>
</body>
</html>
